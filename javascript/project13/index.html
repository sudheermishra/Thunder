<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 40px;
        background: #f4f4f4;
      }

      h1 {
        margin-bottom: 10px;
      }

      #status {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 20px;
      }

      #board {
        display: grid;
        grid-template-columns: repeat(3, 80px);
        gap: 8px;
        margin-bottom: 20px;
      }

      #board button {
        width: 80px;
        height: 80px;
        font-size: 32px;
        font-weight: bold;
        cursor: pointer;
        border: 2px solid #333;
        background: white;
      }

      #board button:hover {
        background: #eaeaea;
      }

      #resetBtn {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        background: #007bff;
        color: white;
        border-radius: 5px;
      }

      #resetBtn:hover {
        background: #0056b3;
      }
    </style>

    <script src="index.js" defer></script>
  </head>

  <body>
    <h1>Tic Tac Toe</h1>
    <div id="status">player x turn</div>

    <div id="board">
      <button id="0"></button>
      <button id="1"></button>
      <button id="2"></button>
      <button id="3"></button>
      <button id="4"></button>
      <button id="5"></button>
      <button id="6"></button>
      <button id="7"></button>
      <button id="8"></button>
    </div>

    <button id="resetBtn">Reset</button>
  </body>
</html>
